<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKMÉ WMS | DEPOT UPLOAD & ADMIN</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef5ff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(5, 5, 20, 0.7);
            border-radius: 20px;
            border-bottom: 2px solid #2effbc;
        }
        .header h1 { background: linear-gradient(135deg, #fff, #2effbc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-box, .upload-box, .admin-box {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(46, 255, 188, 0.3);
        }
        input, select {
            background: #0a0a1a;
            border: 1px solid #2c3e5e;
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin: 10px 0;
            font-size: 1rem;
        }
        button {
            background: #2effbc22;
            border: 1px solid #2effbc;
            color: #2effbc;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background: #2effbc; color: #050510; }
        .btn-template { background: #3b82f622; border-color: #3b82f6; color: #3b82f6; margin-bottom: 10px; }
        .btn-danger { background: #ff444422; border-color: #ff6666; color: #ff6666; }
        .btn-danger:hover { background: #ff4444; color: white; }
        .btn-warning { background: #ffcc4422; border-color: #ffcc66; color: #ffcc66; }
        .depot-name { color: #2effbc; font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        .status { margin-top: 10px; padding: 10px; border-radius: 10px; text-align: center; }
        .success { background: #2effbc22; color: #2effbc; }
        .error { background: #ff444422; color: #ff6666; }
        .warning { background: #ffcc4422; color: #ffcc66; }
        h3 { color: #2effbc; margin: 15px 0 10px 0; }
        hr { border-color: #2c3e5e; margin: 15px 0; }
        .button-group { display: flex; gap: 10px; }
        .button-group button { flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #1e2a44; font-size: 0.75rem; }
        th { color: #2effbc; }
        .edit-mode { background: #2effbc22; }
        .edit-input { background: #0a0a1a; border: 1px solid #2effbc; color: white; padding: 5px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>◈ LAKMÉ WMS | DEPOT UPLOAD & ADMIN</h1>
        <p>📥 Upload | ✏️ Update | 🗑️ Delete | Cloud Storage</p>
    </div>

    <!-- Login Section -->
    <div id="loginSection" class="login-box">
        <h3 style="color:#2effbc; text-align:center;">🔐 Login</h3>
        <select id="depotSelect">
            <option value="">Select Depot</option>
            <option value="Bangalore">🏭 Bangalore</option>
            <option value="Chennai">🏭 Chennai</option>
            <option value="Kolkata">🏭 Kolkata</option>
            <option value="Delhi">🏭 Delhi</option>
            <option value="Mumbai">🏭 Mumbai</option>
            <option value="ADMIN">👑 ADMIN (Full Access)</option>
        </select>
        <input type="password" id="passwordInput" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginStatus" class="status"></div>
    </div>

    <!-- Upload Section -->
    <div id="uploadSection" style="display:none;">
        <div class="upload-box">
            <div class="depot-name" id="loggedDepot"></div>
            
            <div class="button-group">
                <button class="btn-template" onclick="downloadTemplate('inward')">📎 Inward Template</button>
                <button class="btn-template" onclick="downloadTemplate('outward')">📎 Outward Template</button>
                <button class="btn-template" onclick="downloadTemplate('rto')">📎 RTO Template</button>
            </div>
            
            <h3>📥 INWARD</h3>
            <input type="file" id="inwardFile" accept=".csv,.xlsx">
            <button onclick="uploadInward()">Upload Inward</button>
            <div id="inwardStatus" class="status"></div>

            <h3>📤 OUTWARD</h3>
            <input type="file" id="outwardFile" accept=".csv,.xlsx">
            <button onclick="uploadOutward()">Upload Outward</button>
            <div id="outwardStatus" class="status"></div>

            <h3>🔄 RTO</h3>
            <input type="file" id="rtoFile" accept=".csv,.xlsx">
            <button onclick="uploadRTO()">Upload RTO</button>
            <div id="rtoStatus" class="status"></div>

            <button onclick="logout()" class="btn-danger">Logout</button>
        </div>
    </div>

    <!-- Admin Data Management Section -->
    <div id="adminSection" style="display:none;">
        <div class="admin-box">
            <div class="depot-name">👑 ADMIN MODE - Full Control</div>
            <button onclick="loadAdminData()" style="margin-bottom:15px;">🔄 Refresh Data</button>
            <div style="overflow-x:auto;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>ID</th><th>Type</th><th>Depot</th><th>Basepack/HUL</th><th>Quantity</th><th>Details</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <button onclick="logout()" class="btn-danger" style="margin-top:15px;">Logout</button>
        </div>
    </div>
</div>

<script>
    const SHEETDB_URL = 'https://sheetdb.io/api/v1/y1k27fv4roasn';
    
    const depotPasswords = {
        "Bangalore": "bangalore123",
        "Chennai": "chennai456",
        "Kolkata": "kolkata789",
        "Delhi": "delhi101",
        "Mumbai": "mumbai202",
        "ADMIN": "admin123"
    };
    
    const validRemarks = ["Good stock", "Excess", "Shortage", "Damage"];
    let currentUser = null;
    let currentUserType = null;
    let allData = [];
    
    function isValidDate(dateStr) {
        if (!dateStr) return false;
        const parts = dateStr.split('-');
        if (parts.length !== 3) return false;
        const day = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10);
        const year = parseInt(parts[2], 10);
        return !(isNaN(day) || isNaN(month) || isNaN(year) || day < 1 || day > 31 || month < 1 || month > 12 || year < 2000 || year > 2100);
    }
    
    function isBlank(val) { return !val || val.toString().trim() === ''; }
    
    function showStatus(id, msg, type) {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = msg; el.className = `status ${type}`; }
        setTimeout(() => { if (el) el.innerHTML = ''; }, 4000);
    }
    
    function showToast(msg, color) {
        let toast = document.createElement('div');
        toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:${color}; color:#050510; padding:10px 20px; border-radius:10px; z-index:9999; font-weight:bold;`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function downloadTemplate(type) {
        let headers = [], sample = [];
        if (type === 'inward') {
            headers = ['Depot', 'Basepack', 'Quantity', 'PKM', 'Expiry', 'EGIR', 'Remarks'];
            sample = [currentUser || 'Bangalore', 'BP-001', '100', 'BATCH-001', '31-12-2028', 'INV-001', 'Good stock'];
        } else if (type === 'outward') {
            headers = ['HUL_Code', 'Basepack', 'Quantity', 'AWB_Code', 'Date', 'Order_Status', 'Courier', 'Remarks'];
            sample = ['HUL-12345', 'BP-001', '50', 'AWB-001', '22-05-2026', 'Delivered', 'Delhivery', 'Success'];
        } else {
            headers = ['HUL_Code', 'Basepack', 'Original_AWB', 'Attempt1_Status', 'Attempt2_Status', 'Attempt3_Status', 'Date'];
            sample = ['HUL-12345', 'BP-001', 'AWB-001', 'Failed', 'Failed', 'Failed', '22-05-2026'];
        }
        let csv = headers.join(',') + '\n' + sample.join(',');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${type}_template.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function login() {
        const depot = document.getElementById('depotSelect').value;
        const password = document.getElementById('passwordInput').value;
        if (!depot) { showStatus('loginStatus', 'Select depot', 'error'); return; }
        if (depotPasswords[depot] === password) {
            currentUser = depot;
            currentUserType = depot === 'ADMIN' ? 'admin' : 'depot';
            document.getElementById('loginSection').style.display = 'none';
            if (currentUserType === 'admin') {
                document.getElementById('adminSection').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('uploadSection').style.display = 'block';
                document.getElementById('loggedDepot').innerHTML = `✅ Logged in: ${depot}<br>☁️ Upload Mode`;
            }
            showStatus('loginStatus', 'Login success!', 'success');
        } else {
            showStatus('loginStatus', 'Invalid password', 'error');
        }
    }
    
    function logout() {
        currentUser = null;
        currentUserType = null;
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('depotSelect').value = '';
        document.getElementById('inwardFile').value = '';
        document.getElementById('outwardFile').value = '';
        document.getElementById('rtoFile').value = '';
    }
    
    function parseFile(file, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            callback(XLSX.utils.sheet_to_json(sheet));
        };
        reader.readAsArrayBuffer(file);
    }
    
    async function uploadToSheet(rows) {
        try {
            const response = await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: rows })
            });
            return { success: response.ok };
        } catch (err) {
            return { success: false, error: err.message };
        }
    }
    
    async function uploadInward() {
        const file = document.getElementById('inwardFile').files[0];
        if (!file) { alert('Select file'); return; }
        parseFile(file, async (data) => {
            let validRows = [];
            for (const row of data) {
                if (isBlank(row.Depot) || isBlank(row.Basepack)) continue;
                const qty = parseFloat(row.Quantity);
                if (isNaN(qty) || qty <= 0) continue;
                if (isBlank(row.PKM) || isBlank(row.Expiry) || !isValidDate(row.Expiry)) continue;
                if (isBlank(row.EGIR) || isBlank(row.Remarks)) continue;
                if (!validRemarks.includes(row.Remarks.toString().trim())) continue;
                validRows.push({
                    Type: 'INWARD', Depot: row.Depot, Basepack: row.Basepack, Quantity: qty,
                    PKM: row.PKM, Expiry: row.Expiry, EGIR: row.EGIR, Remarks: row.Remarks,
                    Upload_Date: new Date().toISOString(), Depot_User: currentUser
                });
            }
            if (validRows.length === 0) { showStatus('inwardStatus', 'No valid rows', 'error'); return; }
            showStatus('inwardStatus', 'Uploading...', 'warning');
            const { success } = await uploadToSheet(validRows);
            if (success) {
                showStatus('inwardStatus', `✅ ${validRows.length} inward rows uploaded!`, 'success');
                showToast(`☁️ ${validRows.length} rows synced!`, '#2effbc');
            } else { showStatus('inwardStatus', 'Upload failed', 'error'); }
            document.getElementById('inwardFile').value = '';
        });
    }
    
    async function uploadOutward() {
        const file = document.getElementById('outwardFile').files[0];
        if (!file) { alert('Select file'); return; }
        parseFile(file, async (data) => {
            let validRows = [];
            for (const row of data) {
                if (isBlank(row.HUL_Code) || isBlank(row.Basepack)) continue;
                const qty = parseFloat(row.Quantity);
                if (isNaN(qty) || qty <= 0) continue;
                validRows.push({
                    Type: 'OUTWARD', HUL_Code: row.HUL_Code, Basepack: row.Basepack, Quantity: qty,
                    AWB_Code: row.AWB_Code || '', Date: row.Date || '', Order_Status: row.Order_Status || '',
                    Courier: row.Courier || '', Remarks: row.Remarks || '',
                    Upload_Date: new Date().toISOString(), Depot_User: currentUser
                });
            }
            if (validRows.length === 0) { showStatus('outwardStatus', 'No valid rows', 'error'); return; }
            showStatus('outwardStatus', 'Uploading...', 'warning');
            const { success } = await uploadToSheet(validRows);
            if (success) { showStatus('outwardStatus', `✅ ${validRows.length} outward rows uploaded!`, 'success'); }
            else { showStatus('outwardStatus', 'Upload failed', 'error'); }
            document.getElementById('outwardFile').value = '';
        });
    }
    
    async function uploadRTO() {
        const file = document.getElementById('rtoFile').files[0];
        if (!file) { alert('Select file'); return; }
        parseFile(file, async (data) => {
            let validRows = [];
            for (const row of data) {
                if (isBlank(row.HUL_Code) || isBlank(row.Basepack)) continue;
                validRows.push({
                    Type: 'RTO', HUL_Code: row.HUL_Code, Basepack: row.Basepack,
                    Original_AWB: row.Original_AWB || '', Attempt1_Status: row.Attempt1_Status || '',
                    Attempt2_Status: row.Attempt2_Status || '', Attempt3_Status: row.Attempt3_Status || '',
                    Date: row.Date || '', Upload_Date: new Date().toISOString(), Depot_User: currentUser
                });
            }
            if (validRows.length === 0) { showStatus('rtoStatus', 'No valid rows', 'error'); return; }
            showStatus('rtoStatus', 'Uploading...', 'warning');
            const { success } = await uploadToSheet(validRows);
            if (success) { showStatus('rtoStatus', `✅ ${validRows.length} RTO rows uploaded!`, 'success'); }
            else { showStatus('rtoStatus', 'Upload failed', 'error'); }
            document.getElementById('rtoFile').value = '';
        });
    }
    
    // ADMIN FUNCTIONS
    async function loadAdminData() {
        try {
            const response = await fetch(SHEETDB_URL);
            allData = await response.json();
            allData = allData.filter(row => row.Type && row.Type !== 'Type');
            renderAdminTable();
            showToast(`📊 Loaded ${allData.length} records`, '#3b82f6');
        } catch (err) { console.error(err); }
    }
    
    function renderAdminTable() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = allData.map((row, index) => `
            <tr id="row-${index}">
                <td>${index + 1}</td>
                <td>${row.Type || '-'}</td>
                <td>${row.Depot || row.Depot_User || '-'}</td>
                <td>${row.Basepack || row.HUL_Code || '-'}</td>
                <td>${row.Quantity || '-'}</td>
                <td style="max-width:200px;">${row.Remarks || row.AWB_Code || row.Attempt1_Status || '-'}</td>
                <td>
                    <button class="btn-warning" style="padding:5px 10px; font-size:0.7rem;" onclick="editRow(${index})">✏️ Edit</button>
                    <button class="btn-danger" style="padding:5px 10px; font-size:0.7rem;" onclick="deleteRow(${index}, '${row.Type}', ${row.id || index})">🗑️ Delete</button>
                </td>
            </tr>
        `).join('');
    }
    
    function editRow(index) {
        const row = allData[index];
        const newData = prompt('Edit JSON data (edit carefully):', JSON.stringify(row, null, 2));
        if (newData) {
            try {
                const parsed = JSON.parse(newData);
                allData[index] = parsed;
                showToast('Row updated locally! Click refresh to sync to cloud.', '#ffcc66');
                renderAdminTable();
            } catch(e) { alert('Invalid JSON'); }
        }
    }
    
    async function deleteRow(index, type, id) {
        if (confirm('Delete this record? Cannot undo!')) {
            try {
                const response = await fetch(`${SHEETDB_URL}/Type/${type}`, { method: 'DELETE' });
                if (response.ok) {
                    allData.splice(index, 1);
                    renderAdminTable();
                    showToast('Deleted!', '#ff6666');
                } else { alert('Delete failed'); }
            } catch(err) { alert('Delete error'); }
        }
    }
</script>
</body>
</html>
