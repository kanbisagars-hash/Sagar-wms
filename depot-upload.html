<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKMÉ WMS | DEPOT UPLOAD</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #eef5ff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(5, 5, 20, 0.7);
            border-radius: 20px;
            border-bottom: 2px solid #2effbc;
        }
        .header h1 { background: linear-gradient(135deg, #fff, #2effbc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header p { font-size: 0.8rem; color: #8fa3c2; margin-top: 8px; }
        .login-box, .upload-box {
            background: rgba(15, 25, 45, 0.7);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(46, 255, 188, 0.3);
        }
        input, select {
            background: #0a0a1a;
            border: 1px solid #2c3e5e;
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin: 10px 0;
        }
        button {
            background: #2effbc22;
            border: 1px solid #2effbc;
            color: #2effbc;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #2effbc; color: #050510; }
        .btn-template { background: #3b82f622; border-color: #3b82f6; color: #3b82f6; margin-bottom: 10px; }
        .depot-name { color: #2effbc; font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        .status { margin-top: 10px; padding: 10px; border-radius: 10px; text-align: center; }
        .success { background: #2effbc22; color: #2effbc; }
        .error { background: #ff444422; color: #ff6666; }
        h3 { color: #2effbc; margin: 15px 0 10px 0; }
        hr { border-color: #2c3e5e; margin: 15px 0; }
        .logout-btn { background: #ff444422; border-color: #ff6666; color: #ff6666; margin-top: 20px; }
        .button-group { display: flex; gap: 10px; }
        .button-group button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>◈ LAKMÉ WMS | DEPOT UPLOAD</h1>
        <p>📥 Inward | 📤 Outward | 🔄 RTO | Data goes to: Depot_Inward, Depot_Outward, Depot_RTO</p>
    </div>

    <div id="loginSection" class="login-box">
        <select id="depotSelect">
            <option value="">Select Your Depot</option>
            <option value="Bangalore">🏭 Bangalore Depot</option>
            <option value="Chennai">🏭 Chennai Depot</option>
            <option value="Kolkata">🏭 Kolkata Depot</option>
            <option value="Delhi">🏭 Delhi Depot</option>
            <option value="Mumbai">🏭 Mumbai Depot</option>
        </select>
        <input type="password" id="passwordInput" placeholder="Enter Password">
        <button onclick="login()">Login</button>
        <div id="loginStatus" class="status"></div>
    </div>

    <div id="uploadSection" style="display:none;">
        <div class="upload-box">
            <div class="depot-name" id="loggedDepot"></div>
            
            <div class="button-group">
                <button class="btn-template" onclick="downloadTemplate('inward')">📎 Inward Template</button>
                <button class="btn-template" onclick="downloadTemplate('outward')">📎 Outward Template</button>
                <button class="btn-template" onclick="downloadTemplate('rto')">📎 RTO Template</button>
            </div>
            
            <h3>📥 INWARD</h3>
            <input type="file" id="inwardFile" accept=".csv,.xlsx">
            <button onclick="uploadData('INWARD')">Upload Inward</button>
            <div id="inwardStatus" class="status"></div>

            <h3>📤 OUTWARD</h3>
            <input type="file" id="outwardFile" accept=".csv,.xlsx">
            <button onclick="uploadData('OUTWARD')">Upload Outward</button>
            <div id="outwardStatus" class="status"></div>

            <h3>🔄 RTO</h3>
            <input type="file" id="rtoFile" accept=".csv,.xlsx">
            <button onclick="uploadData('RTO')">Upload RTO</button>
            <div id="rtoStatus" class="status"></div>

            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>
</div>

<script>
    // ========== YOUR APPS SCRIPT URL ==========
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRclDP2FIOOFtBDnTp_HqKgo5mo2tIQ5WNz77gPjSFV0LZxdeHS0yWOdQSbJFO8IfJ/exec';
    
    const depotPasswords = {
        "Bangalore": "bangalore123",
        "Chennai": "chennai456",
        "Kolkata": "kolkata789",
        "Delhi": "delhi101",
        "Mumbai": "mumbai202"
    };
    
    let currentDepot = null;
    
    function showStatus(id, msg, type) {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = msg; el.className = `status ${type}`; }
        setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
    }
    
    function downloadTemplate(type) {
        let headers = [];
        if (type === 'inward') {
            headers = ['Depot', 'Basepack Code', 'SKU7', 'Product Name', 'PKM', 'Batch Code', 'Expiry Date', 'Challan Qty', 'Shortage Qty', 'Damage Qty', 'Excess Qty', 'EGIR', 'Remarks'];
        } else if (type === 'outward') {
            headers = ['Channel', 'Tester', 'Category', 'HUL Code', 'Basepack', 'Basepack Description', 'Order Status', 'Date', 'Month', 'Actual Planned Quantity', 'Allocated Order Quantity', 'Bill Ref. No', 'Bill Quantity', 'Depot', 'HFS Code', 'Classification', 'Account', 'Complete Address', 'PBID', 'Name', 'Dispatches QTY', 'Delivery Challan number / Order ID', 'AWB Code', 'Courier Company Name', 'Order Picked up Date', 'Estimate Delivery Date', 'Actual Order Delivered Date', 'Shiprocket date', 'Remarks'];
        } else {
            headers = ['Channel', 'Tester', 'Category', 'HUL Code', 'Basepack', 'Basepack Description', 'Order Status', 'Date', 'Month', 'Actual Planned Quantity', 'Allocated Order Quantity', 'Bill Ref. No', 'Bill Quantity', 'Depot', 'HFS Code', 'Classification', 'Account', 'Complete Address', 'PBID', 'Name', 'Dispatches QTY', 'Delivery Challan number / Order ID', 'AWB Code', 'Courier Company Name', 'Order Picked up Date', 'Estimate Delivery Date', 'Actual Order Delivered Date', 'Shiprocket date', 'Remarks', 'RTO2 Delivery Challan number / Order ID', 'RTO2 AWB Code', 'RTO2 Order Status', 'RTO2 Courier Company Name', 'RTO3 Delivery Challan number / Order ID', 'RTO3 AWB Code', 'RTO3 Order Status', 'RTO3 Courier Company Name'];
        }
        let csv = headers.join(',') + '\n';
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${type}_template.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function login() {
        const depot = document.getElementById('depotSelect').value;
        const password = document.getElementById('passwordInput').value;
        if (!depot) { showStatus('loginStatus', 'Select depot', 'error'); return; }
        if (depotPasswords[depot] === password) {
            currentDepot = depot;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('loggedDepot').innerHTML = `✅ Logged in: ${depot}<br>📁 Data will go to: ${depot}_Inward, ${depot}_Outward, ${depot}_RTO sheets`;
            showStatus('loginStatus', 'Login success!', 'success');
        } else {
            showStatus('loginStatus', 'Invalid password', 'error');
        }
    }
    
    function logout() {
        currentDepot = null;
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('inwardFile').value = '';
        document.getElementById('outwardFile').value = '';
        document.getElementById('rtoFile').value = '';
    }
    
    function parseFile(file, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            callback(XLSX.utils.sheet_to_json(sheet));
        };
        reader.readAsArrayBuffer(file);
    }
    
    async function uploadData(type) {
        let fileInput, statusId;
        if (type === 'INWARD') {
            fileInput = document.getElementById('inwardFile');
            statusId = 'inwardStatus';
        } else if (type === 'OUTWARD') {
            fileInput = document.getElementById('outwardFile');
            statusId = 'outwardStatus';
        } else {
            fileInput = document.getElementById('rtoFile');
            statusId = 'rtoStatus';
        }
        
        const file = fileInput.files[0];
        if (!file) { alert('Select file'); return; }
        
        parseFile(file, async (data) => {
            showStatus(statusId, `Uploading ${data.length} rows to ${currentDepot}_${type}...`, 'warning');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        depot: currentDepot,
                        type: type,
                        rows: data
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    showStatus(statusId, `✅ ${data.length} rows saved to ${currentDepot}_${type}!`, 'success');
                } else {
                    showStatus(statusId, `❌ Upload failed: ${result.error}`, 'error');
                }
            } catch (err) {
                showStatus(statusId, `❌ Error: ${err.message}`, 'error');
            }
            
            fileInput.value = '';
        });
    }
</script>
</body>
</html>
