<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKMÉ WMS | MASTER DASHBOARD</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef5ff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(5, 5, 20, 0.7);
            border-radius: 20px;
            border-bottom: 2px solid #2effbc;
        }
        .header h1 { background: linear-gradient(135deg, #fff, #2effbc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge { background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 50px; border: 1px solid #2effbc; }
        .live-dot { display: inline-block; width: 10px; height: 10px; background: #2effbc; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 8px; }
        @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(10, 15, 35, 0.8);
            border-radius: 20px;
            padding: 20px;
            border-left: 4px solid #2effbc;
        }
        .stat-card .value { font-size: 2rem; font-weight: 800; margin-top: 8px; }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: rgba(5, 5, 20, 0.6);
            border-radius: 20px;
            align-items: flex-end;
        }
        .filter-group select, .filter-group input {
            background: #0a0a1a;
            border: 1px solid #2c3e5e;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
        }
        .btn-primary {
            background: #2effbc22;
            border: 1px solid #2effbc;
            color: #2effbc;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
        }
        .table-container {
            background: rgba(10, 15, 35, 0.7);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 25px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e2a44; font-size: 0.75rem; }
        th { color: #2effbc; }
        .status-good { background: #2effbc22; color: #2effbc; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .status-warning { background: #ffcc4422; color: #ffcc66; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .status-expired { background: #ff444422; color: #ff6666; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.7rem; color: #4a617c; }
    </style>
</
